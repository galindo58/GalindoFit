{% extends 'base.html' %}

{% block content %}

<div class="auth-container fade-in-up">

    <!-- TÍTULO -->
    <div class="text-center mb-4">
        <h3 class="font-orbitron fw-bold text-red m-0">EDITAR ATLETA</h3>
        <p class="text-gray small mt-2 mb-0">Actualiza la información del atleta.</p>
    </div>

    <!-- FORMULARIO -->
    <form action="{{ url_for('obtener_usuario', id=u.id_usuario) }}" method="POST">

        <!-- NOMBRE -->
        <div class="form-group">
            <label class="form-label text-gray small font-bold">Nombre</label>
            <input type="text" name="nombre" class="input-fitness" value="{{ u.nombre }}" required>
        </div>

        <!-- EMAIL -->
        <div class="form-group">
            <label class="form-label text-gray small font-bold">Correo</label>
            <input type="email" name="email" class="input-fitness" value="{{ u.email }}" required>
        </div>

        <!-- PLAN -->
        <div class="form-group">
            <label class="form-label text-gray small font-bold">Plan</label>
            <select name="id_plan" class="input-fitness" required>
                {% for p in planes %}
                    <option value="{{ p.id_plan }}" {% if p.id_plan == u.id_plan %}selected{% endif %}>
                        {{ p.nombre_plan }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <!-- MÉTRICAS -->
        <div class="form-row-grid mb-4">
            <!-- PESO -->
            <div class="form-group mb-0">
                <label class="form-label text-gray small font-bold">Peso (kg)</label>
                <input type="number" step="0.1" name="peso_kg" class="input-fitness mb-0" value="{{ u.peso_kg or '' }}">
            </div>

            <!-- KCAL -->
            <div class="form-group mb-0">
                <label class="form-label text-gray small font-bold">Kcal</label>
                <input type="number" name="calorias_objetivo" class="input-fitness mb-0" value="{{ u.calorias_objetivo or '' }}">
            </div>
        </div>

        <!-- BOTONES -->
        <div class="flex-between gap-2" style="margin-top: 25px;">
            <!-- CANCELAR -->
            <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary w-100" style="text-align: center;">CANCELAR</a>
            
            <!-- GUARDAR -->
            <button type="submit" class="btn btn-glow w-100">GUARDAR</button>
        </div>

    </form>

</div>

{% endblock %}
